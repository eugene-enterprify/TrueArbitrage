# Налаштування за замовчуванням. Поріг, мін. обсяг і mute можна міняти
# командами бота під час роботи — вони зберігаються в базі і мають пріоритет.

threshold_pct: 2.0        # поріг брудного спреду, %
min_volume_musd: 20.0     # мін. обсяг 24h у млн $ (менший з двох бірж)
cooldown_min: 15          # не частіше одного сповіщення на пару за N хв
close_factor: 0.5         # спред вважається закритим нижче threshold * close_factor

max_quote_age_sec: 10     # котирування старші за N сек виключаються з розрахунку

# Тейкер-комісія за одну угоду, % (повний цикл = 4 угоди: вхід/вихід на двох ногах)
fees_pct:
  Binance: 0.05
  OKX: 0.05

meta_refresh_sec: 300     # оновлення funding rates і обсягів 24h, сек

sampling:
  delta_pct: 0.1          # писати в базу при зміні спреду більш ніж на N в.п.
  interval_sec: 60        # ...або не рідше ніж раз на N сек

db_path: data/spreads.db
